version: '3.8'
# initial run:
# docker compose -f docker-compose.yml up --build
# visit: http://localhost:8007/docs
# run the public endpoint 1 time so that the tables are defined
# seed db: docker exec -i mariadb_1 mysql -u user -ppassword poodle < mariadb_seed.sql

services:
  db:
    image: mariadb:10.5.25
    container_name: mariadb_1
    env_file:
      - ./envs/db.env
    ports:
      - "3307:3306"
  #    volumes:
  #      - db_data:/var/lib/mysql

  web:
    build:
      dockerfile: Dockerfile
    #    command: sh -c "alembic revision --autogenerate -m 'initial' && alembic upgrade head"
    container_name: app_1
    ports:
      - "8007:80"
    env_file:
      - ./src/app/.env
    depends_on:
      - db


#volumes: # ignoring volumes because clean state of db needed at the current state
#  db_data: